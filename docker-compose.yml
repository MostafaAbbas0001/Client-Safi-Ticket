services:
  client:
    build:
      context: .
      args:
        VITE_API_BASE_URL: ${VITE_API_BASE_URL:-/api}
    image: safi-client
    container_name: safi_client
    restart: unless-stopped
    environment:
      NODE_ENV: production
      HOST: 0.0.0.0
      PORT: 3000
    ports:
      - "127.0.0.1:${CLIENT_PORT:-3000}:3000"
    networks:
      - safi_net

networks:
  safi_net:
    external: true
